version: "3.9"
# Preview Forge generated docker-compose template
# Replace ${PLACEHOLDERS} with actual values from runs/<id>/generated/

services:
  api:
    image: ${PROJECT}-api:latest
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "18080:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks:
      - ${PROJECT}_net

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - ${PROJECT}_net
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "18443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - ${PROJECT}_net
    restart: unless-stopped

volumes:
  db_data:
  caddy_data:
  caddy_config:

networks:
  ${PROJECT}_net:
    driver: bridge
