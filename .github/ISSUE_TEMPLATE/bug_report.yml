name: 🐛 Bug report
description: Something in the plugin isn't working as specified
labels: [bug, triage]
body:
  - type: input
    id: claude_version
    attributes:
      label: Claude Code version
      placeholder: "2.1.117"
    validations:
      required: true
  - type: input
    id: plugin_version
    attributes:
      label: Plugin version (from /plugin list)
      placeholder: "1.0.0"
    validations:
      required: true
  - type: dropdown
    id: dd_cycle
    attributes:
      label: Which DD cycle is affected?
      options:
        - PreviewDD (Stages 1–3)
        - Gate H1 (Claude Design / Studio)
        - SpecDD (Stages 4–5)
        - TestDD (Stages 6–7)
        - Gate H2 (deployment)
        - Meta layer (M1/M2/M3)
        - Memory / LESSONS
        - Hooks
        - Slash commands
        - Install / marketplace
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: |
        1. /pf:new "…"
        2. …
        3. observe …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior (per v8.0 spec)
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / blackboard / trace.jsonl excerpt
      render: text
